<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrebolMania - Probá tu Suerte</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; overflow-x: hidden; }

  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    position: relative;
    padding-bottom: 0;
  }

  .bg-image {
    position: absolute; inset: 0;
    background-image: url('Verificación_de_página.png');
    background-size: cover;
    background-position: center top;
    z-index: 0;
  }

  .bg-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 55%, rgba(0,0,0,0.7) 75%, rgba(0,0,0,0.7) 100%);
    z-index: 1;
  }

  .landing-content {
    position: absolute;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
    bottom: 13%;
  }

  .pulse-ring {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50px;
    background: rgba(37,211,102,0.3);
    animation: pulse 1.8s ease-out infinite;
    z-index: -1;
  }
  @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.18); opacity: 0; } }

  .whatsapp-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 18px 40px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 0 30px rgba(37,211,102,0.6), 0 4px 20px rgba(0,0,0,0.4);
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: bounceBtn 2s ease-in-out infinite;
  }
  @keyframes bounceBtn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .whatsapp-btn:hover { box-shadow: 0 0 50px rgba(37,211,102,0.9), 0 4px 20px rgba(0,0,0,0.4); animation: none; transform: scale(1.04); }
  .whatsapp-btn svg { width: 30px; height: 30px; flex-shrink: 0; }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.78rem; color: #ccc;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #25D366; animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #25D366; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 14px 24px; font-size: 0.9rem; color: #fff; z-index: 9999; transition: transform 0.3s ease; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="landing">
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="landing-content">
    <div class="status-bar">
      <div class="status-dot"></div>
      <span>Agentes activos ahora · 24hs</span>
    </div>
    <div style="position:relative; width:100%; max-width:380px; display:flex; justify-content:center;">
      <div class="pulse-ring"></div>
      <a id="whatsapp-btn" href="#" class="whatsapp-btn" onclick="handleWhatsAppClick(event)">
        <svg viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        HABLAR POR WHATSAPP
      </a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, addDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCuwSu4gWkuPnO5zCdhDnAOX8hwdtUmMOw",
    authDomain: "trebolmania-2ee95.firebaseapp.com",
    projectId: "trebolmania-2ee95",
    storageBucket: "trebolmania-2ee95.firebasestorage.app",
    messagingSenderId: "1079661627624",
    appId: "1:1079661627624:web:b891dbc6adf1d58d36a15d"
  };

  window._fb = { app: null, db: null, connected: false };
  window._numbers = [];
  window._currentIndex = 0;
  window._metaConfig = JSON.parse(localStorage.getItem('meta_config') || '{}');

  // Conectar Firebase
  async function init() {
    try {
      window._fb.app = initializeApp(FIREBASE_CONFIG);
      window._fb.db = getFirestore(window._fb.app);
      window._fb.connected = true;
      await refreshNumbers();
    } catch(e) { console.warn('Firebase error:', e); }

    // Inyectar píxel si está configurado
    if (window._metaConfig?.pixelId) injectPixel(window._metaConfig.pixelId);
  }

  async function refreshNumbers() {
    if (!window._fb.connected) return;
    try {
      const snap = await getDocs(collection(window._fb.db, 'whatsapp_numbers'));
      window._numbers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) {}
  }

  function injectPixel(pixelId) {
    if (!pixelId || document.getElementById('fb-pixel-script')) return;
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.id='fb-pixel-script';t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', pixelId);
    fbq('track', 'PageView');
  }

  async function sendCAPIEvent(eventName) {
    const conf = window._metaConfig;
    if (!conf?.pixelId || !conf?.token) return;
    try {
      await fetch(`https://graph.facebook.com/v19.0/${conf.pixelId}/events?access_token=${conf.token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: [{ event_name: eventName, event_time: Math.floor(Date.now()/1000), action_source: 'website', event_source_url: window.location.href, user_data: { client_user_agent: navigator.userAgent } }] })
      });
    } catch(e) {}
  }

  window.handleWhatsAppClick = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('whatsapp-btn');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> Verificando...';
    btn.style.pointerEvents = 'none';

    try {
      // Refrescar desde Firebase en tiempo real
      await refreshNumbers();

      const actives = window._numbers.filter(n => n.status !== 'restricted');
      if (!actives.length) {
        showToast('⚠️ No hay agentes disponibles ahora. Intentá en unos minutos.');
        return;
      }

      if (window._currentIndex >= actives.length) window._currentIndex = 0;
      const chosen = actives[window._currentIndex++];
      const msg = encodeURIComponent(chosen.message || 'Hola! Quiero saber más sobre TrebolMania 🍀');

      // Guardar lead
      if (window._fb.connected) {
        try {
          await addDoc(collection(window._fb.db, 'leads'), {
            phone: chosen.phone,
            agentName: chosen.name,
            timestamp: Date.now(),
            userAgent: navigator.userAgent,
          });
        } catch(e) {}
      }

      // Píxel + CAPI
      if (typeof fbq !== 'undefined') fbq('track', 'Lead');
      await sendCAPIEvent('Lead');

      window.open(`https://wa.me/${chosen.phone}?text=${msg}`, '_blank');

    } finally {
      btn.innerHTML = originalHTML;
      btn.style.pointerEvents = 'auto';
    }
  };

  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  };

  init();
</script>
</body>
</html>
